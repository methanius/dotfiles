# Fuzzel launcher config.
# Tomorrow Night palette, JetBrainsMonoNL Nerd Font 11 -- matches waybar.
# Colors are RRGGBBAA (8 hex digits, no leading #).

font=JetBrainsMonoNL Nerd Font:size=12
dpi-aware=auto
prompt=> 
icon-theme=Adwaita
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
terminal=ghostty
layer=overlay
lines=12
width=40
horizontal-pad=20
vertical-pad=12
inner-pad=8

[colors]
background=282A2Eff
text=C5C8C6ff
prompt=F0C674ff
placeholder=707880ff
input=C5C8C6ff
match=8ABEB7ff
selection=373B41ff
selection-text=F0C674ff
selection-match=8ABEB7ff
counter=707880ff
border=373B41ff

[border]
width=2
radius=8
